# DARP configuration
#
# Author: Luciano Federico Pereira
# Copyright (C) 2026 Luciano Federico Pereira
# Licensed under version 2.1 of the GNU Lesser General Public License.
#
# Adopting DARP for a new project — edit in this order:
#   1. [project]      name, orcid
#   2. [subject]      experiment label
#   3. [capture]      api_command, paths, family names, and related settings
#   4. [paths]        trace file location and report output directory
#   5. [baseline]     pre-registered commit or Zenodo DOI
#   6. [algorithms]   rename primitives to project-specific names (optional)
#   7. [algorithm]    pick session_metric (must resolve to the 'first' primitive)
#   8. [definition.X] one section per metric; algorithm = <name from [algorithms]>
#
# When ready to publish:
#   set stream = true in [output], then run:
#   python3 darp.py stamp <file.darp>
# ════════════════════════════════════════════════════════════════════════════


# ── Project identity ─────────────────────────────────────────────────────────
# orcid   : your ORCID iD (a plain claim — not trusted on its own).
# repo    : this paper's repo as a FULL URL on a known host (host/owner/repo:
#           github.com, gitlab.com, bitbucket.org, codeberg.org, gitea.com,
#           gitee.com). Written into definitions.repo; the paper cites the same URL.
# license : SPDX identifier (e.g. LGPL-2.1-only) or a URL.
# `verify --verify-authorship` confirms authorship with one public read. On a
# known host it matches the repo's account (host/owner) against your ORCID
# researcher-urls, so listing your profile (e.g. github.com/you) once covers
# every repo under it. On an unknown host it needs the exact repo URL listed,
# one-to-one. Only you can add that link, and only you can push under that account.

[project]
name    = Your Project Name
orcid   = 0000-0000-0000-0000
repo    = https://github.com/your-account/your-repo
license = CC-BY-4.0


# ── Provenance anchor ────────────────────────────────────────────────────────
# The commit or DOI where the experiment design was pre-registered. Drives the
# baseline comparison in `analyze` and the generated filename. Replace with a
# Zenodo DOI once the pre-registration document is published.
#   zenodo_doi = 10.5281/zenodo.XXXXXXX

[baseline]
commit = 0000000000000000000000000000000000000000


# ── Provenance links ─────────────────────────────────────────────────────────
# Free-form: one `description = url` per line, any number, any wording. Lands in
# the hashed definitions.links as a {description: url} map.

[links]
Preprint = https://arxiv.org/abs/0000.00000
Dataset  = https://zenodo.org/record/0000000


# ── How to cite the paper (Citation File Format, embedded) ───────────────────
# Becomes definitions.citation as a CFF 1.2.0 object so any tool can render
# APA / BibTeX / MLA. `darp cite <file.darp>` prints it. The author is built
# from given/family names plus the [project] orcid. Omit the section to skip.

[citation]
title         = Your Paper or Software Title
type          = software
version       = 1.0
given_names   = Your Given Names
family_names  = Your Family Name
date_released =
doi           =
url           = https://github.com/your-account/your-repo
message       = If you use this artifact, please cite it as below.


# ── Experiment label ─────────────────────────────────────────────────────────
# Change this for each distinct measurement subject.

[subject]
name = hint-followthrough


# ── Source field map ─────────────────────────────────────────────────────────
# Maps your trace format's field names to DARP's internal model.
# Only set keys that differ from the defaults shown in [source] below.
# Dotted paths (e.g. attributes.darp.source) reach nested fields.
# ts_scale: multiply the raw numeric timestamp to get Unix seconds.
#
# ── OpenTelemetry OTLP JSON ──────────────────────────────────────────────────
# Spans exported via otelcol to JSON. Tags live under attributes.* (dict).
#   event_field      = name
#   hint_value       = darp_hint             (set on your span name)
#   action_value     = darp_action
#   ts_field         = startTimeUnixNano
#   ts_scale         = 1e-9
#   source_field     = attributes.darp.source
#   synthetic_field  = attributes.darp.synthetic
#   try_next_field   = attributes.darp.try_next
#   tool_field       = attributes.tool.name
#   invocation_field = attributes.tool.input
#
# ── Zipkin JSON ──────────────────────────────────────────────────────────────
# timestamp is microseconds; tags is a flat dict — dotted paths work.
#   event_field      = name
#   hint_value       = darp_hint
#   action_value     = darp_action
#   ts_field         = timestamp
#   ts_scale         = 1e-6
#   source_field     = tags.darp.source
#   tool_field       = tags.tool.name
#   invocation_field = tags.tool.input
#
# ── Datadog APM JSON ─────────────────────────────────────────────────────────
# start is nanoseconds; meta is a flat string dict.
#   event_field      = resource
#   hint_value       = darp_hint
#   action_value     = darp_action
#   ts_field         = start
#   ts_scale         = 1e-9
#   source_field     = meta.darp_source
#   tool_field       = meta.tool_name
#   invocation_field = meta.invocation
#
# ── AWS CloudWatch structured logs ───────────────────────────────────────────
# timestamp is milliseconds; nested fields under metadata.*.
#   event_field      = eventType
#   hint_value       = darp_hint
#   action_value     = darp_action
#   ts_field         = timestamp
#   ts_scale         = 1e-3
#   source_field     = metadata.darp.source
#   tool_field       = metadata.tool.name
#   invocation_field = metadata.tool.input
#
# ── Generic custom NDJSON ────────────────────────────────────────────────────
# Full control — name your fields whatever makes sense in your app.
#   event_field      = type
#   hint_value       = hint
#   action_value     = action
#   ts_field         = time_ms
#   ts_scale         = 1e-3
#   source_field     = src
#   try_next_field   = next_cmds
#   tool_field       = tool
#   invocation_field = cmd
#
# ── Jaeger JSON (limited) ─────────────────────────────────────────────────────
# NOTE: Jaeger tags are an array [{key,value}], not a dict. Dotted-path access
# does not work for tags. Flatten tags to a dict in a pre-processing step, then
# treat as generic NDJSON above.
#
# ── LangSmith / LangFuse (limited) ───────────────────────────────────────────
# NOTE: start_time is ISO 8601 string, not a numeric timestamp. ts_scale cannot
# convert strings. Parse to Unix seconds in a pre-processing step first.

[source]
event_field      = event
hint_value       = darp_hint
action_value     = darp_action
ts_field         = ts
ts_scale         = 1.0
source_field     = source
synthetic_field  = synthetic
try_next_field   = try_next
tool_field       = tool
invocation_field = invocation


# ── Capture ──────────────────────────────────────────────────────────────────
# How darp.py reads trace files and identifies significant events.
# specific_families: endpoint families classified as structured lookups.
# generic_families:  endpoint families classified as broad search.

[capture]
api_command       = api.py
packages_path     = packages/
vibe_pattern      = vibe
memory_tool       = mcp__ccd_session__search_session_transcripts
packages_tools    = Read,Glob,Grep
trace_pattern     = hint_trace_*.jsonl
smoke_prefix      = smoke
specific_families = which,component,model,docs,discover,frontend,ls
generic_families  = grep,find


# ── File paths ───────────────────────────────────────────────────────────────

[paths]
trace_dir = ../state
out_dir   = reports


# ── Algorithm name map ───────────────────────────────────────────────────────
# The four computation primitives and their default names.
# Rename a key on the left to use a project-specific name in [definition.*].
#
# Primitives and what they compute:
#   next   — immediately-next tool call: followed / modified / routed / memory
#   window — lookahead N steps: followed (api call) within window after gate
#   first  — session-level: classifies the first api_command call per session
#   rate   — fraction of sessions that contain at least one hint of a source
#
# Example rename:  packages_routing = window
# Then write:      algorithm = packages_routing   in [definition.read_gate]

[algorithms]
next   = next
window = window
first  = first
rate   = rate


# ── Algorithm settings ───────────────────────────────────────────────────────
# session_metric: name of a definition whose algorithm resolves to 'first'.
#   Its output populates health{} and drives the per-session trend column.
# min_sessions: fewer sessions than this triggers a WARNING on session_count.

[algorithm]
session_metric = first_lookup
min_sessions   = 5


# ── Metric definitions ───────────────────────────────────────────────────────
# One [definition.NAME] section per metric source captured in your traces.
# NAME must match the source field emitted by your hint hooks.
#
# Required keys for every definition:  algorithm, description, followed_if, routed_if
# Optional free-text label:            type  (semantic label for reviewers; not used by code)
#
# algorithm-specific keys:
#   next   — trigger_source
#   window — trigger_source, window, echo_dedup, divergence_max, file_family,
#             echo_dedup_field, echo_dedup_strip_prefix
#   first  — (no trigger; session-level)
#   rate   — trigger_source

[definition.greplast_gate]
algorithm      = next
trigger_source = greplast_gate
description    = Agent reached for grep/find before trying a specific API endpoint.
followed_if    = Next tool call invokes api.py with a suggested endpoint family.
modified_if    = Next tool call invokes api.py but a different endpoint than suggested.
routed_if      = Next tool call is Read, Glob, Grep, or Bash instead of api.py.
notes          = Matched-pair experiment (variant A vs B) is the next planned intervention.

[definition.read_gate]
algorithm               = window
trigger_source          = read_gate
window                  = 10
echo_dedup              = true
echo_dedup_field        = searched
echo_dedup_strip_prefix = Read
divergence_max          = 20.0
description    = Agent read a file under packages/ without a preceding api.py call in the session.
followed_if    = An api.py file? call occurs within window tool calls after the gate.
modified_if    = Any api.py call occurs within window tool calls after the gate.
routed_if      = No api.py call within window tool calls after the gate.
notes          = Two views: per-gate% (tuning metric) and per-session% (sanity check). Divergence >20pts between views indicates gate-cluster density, not regression.

[definition.first_lookup]
algorithm      = first
description    = Per-session: was the first structured API lookup a specific endpoint rather than a generic one?
followed_if    = First non-vibe api.py call in the session uses a specific endpoint family.
modified_if    = N/A — binary session-level metric; no modified state.
routed_if      = First non-vibe api.py call uses grep? or find? (generic search).
notes          = Not hint-driven. Acts as the primary behavioral trend metric. No control arm needed — the first call is uninfluenced by any gate or hint.

[definition.api_empty]
algorithm      = next
trigger_source = api_empty
description    = api.py returned an empty result. Hint suggests a narrower or alternative endpoint.
followed_if    = Next tool call invokes api.py with a suggested endpoint family.
modified_if    = Next tool call invokes api.py with a different endpoint/query than suggested.
routed_if      = Next tool call is Read, Glob, Grep, or Bash instead of api.py.
notes          = Noisy single-point signal. Act only on >10pt sustained shift across multiple checks.


# ── Baseline values for anomaly comparison (python3 darp.py analyze) ─────────
# Keys are either:
#   - a definition name (e.g. greplast_gate)        → compared against metrics[].value
#   - a health key (e.g. first_lookup_specific_pct) → compared against health{}

[values]
greplast_gate = 41.0
read_gate     = 17.0
# first_lookup_specific_pct = 0.0


# ── Anomaly thresholds ────────────────────────────────────────────────────────
# noise_band:  within this range of baseline = PASS
# warn_band:   beyond noise_band but within warn_band = WARNING; beyond = FAIL
# divergence:  max acceptable per-gate% vs per-session% gap (window metrics)

[thresholds]
noise_band = 10.0
warn_band  = 20.0
divergence = 20.0


# ── Output ───────────────────────────────────────────────────────────────────
# stream = false  compact, no replay (default while iterating)
# stream = true   embeds anonymized event stream; required for OTS stamping and Level 3/4 verify
# format_version  .darp format version written to output (default: 1.0)

[output]
stream         = false
format_version = 1.0


# ── Anchor infrastructure ────────────────────────────────────────────────────
# calendars: comma-separated OpenTimestamps calendar URLs.
#            Default is the three public pool servers.
#            Override to use a private or regional calendar.
# orcid_api: base URL of the ORCID public read API used by
#            `verify --verify-authorship` to validate the iD, author name, and
#            repo in one public GET. Default is production; for testing use the
#            sandbox: https://pub.sandbox.orcid.org/v3.0
# timeout_s: network timeout for OTS calendars, the Bitcoin backend, and the
#            ORCID read used by `verify --verify-authorship`.

[anchor]
timeout_s       = 15
orcid_api       = https://pub.orcid.org/v3.0
calendars       = https://a.pool.opentimestamps.org/digest,https://b.pool.opentimestamps.org/digest,https://c.pool.opentimestamps.org/digest
