#
# darp.py is fully type-checked; the only mypy findings are missing type stubs
# for third-party libraries that don't ship them. Silence those so a plain
# `mypy darp.py` passes out-of-the-box without weakening checks on our own code.

[mypy]

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-jsonschema.*]
ignore_missing_imports = True

[mypy-opentimestamps.*]
ignore_missing_imports = True
